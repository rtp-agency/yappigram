[pytest]
# pytest config for the yappigram backend test suite.
#
# - testpaths: only `tests/` runs; we never accidentally collect anything
#   under media/, sessions/, etc.
# - asyncio_mode: auto — all `async def test_...` functions get the event
#   loop wired automatically (no `@pytest.mark.asyncio` per test).
# - addopts: -ra surfaces skipped/xfailed reasons; --strict-markers
#   prevents typo'd `@pytest.mark.foo` from silently passing.
testpaths = tests
asyncio_mode = auto
# Function scope: every test (and its async fixtures) gets a fresh
# event loop. Session scope created cross-loop asyncpg races (engine
# protocol on session loop, session called from function loop →
# `Future attached to a different loop`).
asyncio_default_fixture_loop_scope = function
addopts =
    -ra
    --strict-markers
    --tb=short
    -p no:cacheprovider

markers =
    integration: end-to-end test that exercises the FastAPI app via httpx
    slow: tests that take >1s (broadcast loops, scheduled message ticks)
    telethon: tests that require a Telethon mock (most of them)
